# ─── Input types ─────────────────────────────────────────────

input AccountFilter {
  type: AccountType
  isHidden: Boolean
  isClosed: Boolean
}

input TransactionFilter {
  startDate: String
  endDate: String
  categoryId: ID
  categoryIds: [ID!]
  accountId: ID
  accountIds: [ID!]
  recurringId: ID
  tagIds: [ID!]
  isReviewed: Boolean
  isPending: Boolean
  search: String
  matchString: String
  minAmount: Float
  maxAmount: Float
}

input TransactionSort {
  field: TransactionSortField!
  direction: SortDirection!
}

input EditTransactionInput {
  name: String
  amount: Float
  date: String
  categoryId: ID
  recurringId: ID
  isReviewed: Boolean
  userNotes: String
  tagIds: [ID!]
  goalId: ID
}

input AddTransactionToRecurringInput {
  recurringId: ID!
  isExcluded: Boolean
}

input CreateTagInput {
  name: String!
  colorName: TagColorName!
}

input EditTagInput {
  name: String
  colorName: TagColorName
}

input RecurringFilter {
  categoryId: ID
  state: RecurringState
}

input CreateCategoryInput {
  name: String!
  colorName: TagColorName!
  isExcluded: Boolean
  childCategoryIds: [ID!]
  budget: CreateCategoryBudgetInput
}

input CreateCategoryBudgetInput {
  unassignedAmount: Float
}

input EditCategoryInput {
  name: String
  colorName: TagColorName
  isExcluded: Boolean
  childCategoryIds: [ID!]
}

input EditCategoryBudgetInput {
  amount: Float
}

input EditCategoryBudgetMonthlyInput {
  amount: Float
  month: String
}

input CreateRecurringInput {
  name: String!
  frequency: RecurringFrequency!
  categoryId: ID
  transaction: CreateRecurringTransactionInput
}

input CreateRecurringTransactionInput {
  transactionId: ID!
  accountId: ID!
  itemId: ID!
}

input EditRecurringInput {
  name: String
  frequency: RecurringFrequency
  categoryId: ID
}

# ─── Mutation output types ───────────────────────────────────

type EditTransactionOutput {
  transaction: Transaction!
}

type AddTransactionToRecurringOutput {
  transaction: Transaction!
}

type EditCategoryOutput {
  category: Category!
}

type EditRecurringOutput {
  recurring: Recurring!
}

# ─── Root types ──────────────────────────────────────────────

type Query {
  # User / auth
  userExists: Boolean!
  user: User
  settings: User                          # alias for user; used by NetworthSettings / InvestmentSettings operations

  # Subscriptions
  subscription: Subscription
  subscriptionPlans: [OfferedSubscriptionPlan!]!
  trial: Trial
  paymentMethods: [PaymentMethod!]!

  # Referral
  referral: Referral

  # Accounts
  accounts(filter: AccountFilter): [Account!]!
  account(itemId: ID!, id: ID!): Account

  # Account balance
  accountLiveBalance(itemId: ID!, accountId: ID!): AccountBalanceHistory
  accountMonthlyTotal(itemId: ID!, accountId: ID!): [MonthlyTotal!]!

  # Connections (bank links)
  connections: [Connection!]!
  initConnection: Connection              # discovered via Clairvoyance; exact args unknown
  institutions(
    first: Int
    after: String
  ): InstitutionPagination
  institution(id: ID!): Institution

  # Transactions
  transaction(itemId: ID!, accountId: ID!, id: ID!): Transaction
  transactions(
    first: Int
    after: String
    last: Int
    before: String
    filter: TransactionFilter
    sort: [TransactionSort!]
  ): TransactionPagination

  transactionsFeed(
    first: Int
    after: String
    last: Int
    before: String
    filter: TransactionFilter
    sort: [TransactionSort!]
  ): TransactionFeed

  transactionsCount(filter: TransactionFilter): Int!
  transactionsSummary(filter: TransactionFilter): TransactionSummaryOutput
  exportTransactions(filter: TransactionFilter, sort: [TransactionSort!]): ExportTransactionsOutput

  # Categories
  categories: [Category!]!
  category(id: ID!): Category
  categoriesTotal: CategoriesTotal
  categoryTemplates: [CategoryTemplate!]!

  # Budgets / Spend
  spends(history: Boolean): CategoriesTotal
  monthlySpending: [CategoriesDailySpent!]!

  # Tags
  tags: [Tag!]!
  tag(id: ID!): Tag

  # Recurrings
  recurrings(filter: RecurringFilter): [Recurring!]!
  recurring(id: ID!): Recurring
  upcomingRecurrings: [Recurring!]!
  unpaidUpcomingRecurrings: [Recurring!]!

  # Networth
  networthHistory(timeFrame: TimeFrame): [NetworthHistory!]!
  networthLiveBalance: NetworthHistory

  # Investments
  holdings: [Holding!]!
  investmentBalance(timeFrame: TimeFrame): [InvestmentBalance!]!
  investmentLiveBalance: InvestmentBalance
  investmentAllocation(filter: AllocationFilter): [Allocation!]!
  aggregatedHoldings(
    timeFrame: TimeFrame
    filter: AggregatedHoldingsFilter
    accountId: ID
    itemId: ID
  ): [AggregatedHolding!]!
  topMovers(filter: TopMoversFilter): [TopMover!]!
}

type Mutation {
  # Transactions
  editTransaction(
    itemId: ID!
    accountId: ID!
    id: ID!
    input: EditTransactionInput
  ): EditTransactionOutput!

  addTransactionToRecurring(
    itemId: ID!
    accountId: ID!
    id: ID!
    input: AddTransactionToRecurringInput!
  ): AddTransactionToRecurringOutput!

  # Tags
  createTag(input: CreateTagInput!): Tag!
  editTag(id: ID!, input: EditTagInput!): Tag!

  # Categories
  createCategory(input: CreateCategoryInput!, spend: Boolean, budget: Boolean): Category!
  editCategory(id: ID!, input: EditCategoryInput!, spend: Boolean, budget: Boolean, rollovers: Boolean): EditCategoryOutput!
  deleteCategory(id: ID!): Boolean

  # Category budgets
  editCategoryBudget(categoryId: ID!, input: EditCategoryBudgetInput!): Boolean
  editCategoryBudgetMonthly(categoryId: ID!, input: EditCategoryBudgetMonthlyInput!): Boolean

  # Recurrings
  createRecurring(input: CreateRecurringInput!): Recurring!
  editRecurring(id: ID!, input: EditRecurringInput!): EditRecurringOutput!
  deleteRecurring(id: ID!): Boolean
}
